# Combined controller config — UR12e arm + Robotiq Hand-E gripper
# Used by the unified ros2_control node (sim mode).
# Real hardware uses ur_robot_driver for the arm + separate gripper manager.

/**:
  controller_manager:
    ros__parameters:
      update_rate: 500  # Hz — matches UR default

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      # For fake/sim hardware
      joint_trajectory_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      # For real UR hardware (swap in place of joint_trajectory_controller)
      scaled_joint_trajectory_controller:
        type: ur_controllers/ScaledJointTrajectoryController

      # Real hardware extras
      speed_scaling_state_broadcaster:
        type: ur_controllers/SpeedScalingStateBroadcaster

      io_and_status_controller:
        type: ur_controllers/GPIOController

      # Hand-E gripper
      gripper_action_controller:
        type: position_controllers/GripperActionController

  joint_trajectory_controller:
    ros__parameters:
      joints:
        - shoulder_pan_joint
        - shoulder_lift_joint
        - elbow_joint
        - wrist_1_joint
        - wrist_2_joint
        - wrist_3_joint
      command_interfaces: [position]
      state_interfaces: [position, velocity]
      state_publish_rate: 100.0
      action_monitor_rate: 20.0
      allow_partial_joints_goal: false

  scaled_joint_trajectory_controller:
    ros__parameters:
      joints:
        - shoulder_pan_joint
        - shoulder_lift_joint
        - elbow_joint
        - wrist_1_joint
        - wrist_2_joint
        - wrist_3_joint
      command_interfaces: [position]
      state_interfaces: [position, velocity]
      state_publish_rate: 100.0
      action_monitor_rate: 20.0
      allow_partial_joints_goal: false
      speed_scaling_interface_name: speed_scaling/speed_scaling_factor

  speed_scaling_state_broadcaster:
    ros__parameters:
      state_publish_rate: 100.0

  gripper_action_controller:
    ros__parameters:
      joint: hande_robotiq_hande_left_finger_joint
      action_monitor_rate: 20.0
      max_effort: 10.0
      goal_tolerance: 0.005
      allow_stalling: false
      stall_velocity_threshold: 0.001
      stall_timeout: 1.0
